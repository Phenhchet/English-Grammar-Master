<!DOCTYPE html>
<html lang="km" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pro Hub - គ្រូបង្រៀន AI ផ្ទាល់ខ្លួន</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --primary: #2563eb;
            --secondary: #3b82f6;
        }

        body {
            font-family: 'Inter', 'Kantumruy Pro', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card-shadow {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .perspective-1000 { perspective: 1000px; }
        
        .tab-button.active { color: var(--primary); border-top: 2px solid var(--primary); }
        .tense-card { border-left: 5px solid var(--primary); }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 glass-effect border-b border-gray-200">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-200">
                    <i class="fas fa-graduation-cap text-white text-lg"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">English<span class="text-blue-600">Pro</span></h1>
            </div>
            <div id="xp-display" class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-sm font-bold border border-yellow-200">
                <i class="fas fa-star mr-1"></i> <span id="user-xp">0</span> XP
            </div>
        </div>
    </header>

    <main id="app-container" class="max-w-md mx-auto px-4 pt-6 min-h-screen">
        <!-- Dashboard Section -->
        <section id="section-home" class="space-y-6 fade-in">
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-3xl p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-2xl font-bold mb-2">សួស្តី! រីករាយដែលបានជួប 👋</h2>
                    <p class="opacity-90 font-light text-sm leading-relaxed">តោះ! ចាប់ផ្តើមរៀនវេយ្យករណ៍ និងពាក្យថ្មីៗចំនួន ១០០+ ជាមួយ AI។</p>
                    <button onclick="switchTab('grammar')" class="mt-4 bg-white text-blue-600 px-6 py-2 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-transform">
                        ចាប់ផ្តើមរៀន
                    </button>
                </div>
                <i class="fas fa-rocket absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12"></i>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="switchTab('grammar')" class="bg-white p-5 rounded-2xl border border-gray-100 card-shadow flex flex-col items-center text-center cursor-pointer hover:bg-blue-50 transition">
                    <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center mb-3 text-blue-600">
                        <i class="fas fa-book-open text-xl"></i>
                    </div>
                    <span class="font-bold text-gray-700">វេយ្យករណ៍</span>
                    <span class="text-[10px] text-gray-400 uppercase tracking-widest">12 Tenses</span>
                </div>
                <div onclick="switchTab('vocab')" class="bg-white p-5 rounded-2xl border border-gray-100 card-shadow flex flex-col items-center text-center cursor-pointer hover:bg-green-50 transition">
                    <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mb-3 text-green-600">
                        <i class="fas fa-language text-xl"></i>
                    </div>
                    <span class="font-bold text-gray-700">ពាក្យថ្មីៗ</span>
                    <span class="text-[10px] text-gray-400 uppercase tracking-widest">100+ Words</span>
                </div>
            </div>
        </section>

        <!-- Grammar Section -->
        <section id="section-grammar" class="hidden space-y-4 fade-in">
            <div class="flex items-center space-x-3 mb-4">
                <div class="w-1 h-8 bg-blue-600 rounded-full"></div>
                <h3 class="text-xl font-bold text-gray-800">វេយ្យករណ៍ទាំង ១២កាល</h3>
            </div>
            <div id="tenses-list" class="space-y-4"></div>
        </section>

        <!-- Vocabulary Section -->
        <section id="section-vocab" class="hidden space-y-6 fade-in">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-800">វាក្យសព្ទ (Flashcards)</h3>
                <button onclick="shuffleVocab(event)" class="text-xs bg-blue-50 text-blue-600 px-4 py-2 rounded-xl border border-blue-100 font-bold active:scale-95 transition">
                    <i class="fas fa-random mr-2"></i> លាយពាក្យថ្មី
                </button>
            </div>
            
            <div id="flashcard-container" class="relative w-full perspective-1000">
                <div onclick="nextVocab()" class="w-full bg-white rounded-[2rem] shadow-xl flex flex-col p-8 border border-blue-50 cursor-pointer transition-all duration-300 relative overflow-hidden">
                    <div class="text-center mb-6">
                        <p id="vocab-category" class="text-blue-500 font-bold text-xs mb-2 uppercase tracking-[0.2em]">Daily Vocabulary</p>
                        <h2 id="vocab-en" class="text-4xl font-black text-gray-800 mb-2 tracking-tight">...</h2>
                        <div class="h-1 w-12 bg-blue-600 mx-auto rounded-full mb-4"></div>
                        <p id="vocab-kh" class="text-2xl text-gray-600 font-bold">...</p>
                    </div>

                    <div class="bg-gray-50 rounded-2xl p-5 border border-gray-100 relative mb-4 min-h-[100px]">
                        <span class="absolute -top-3 left-4 bg-white px-3 py-0.5 text-[10px] font-black text-blue-600 border border-blue-100 rounded-full uppercase">Example Usage</span>
                        <p id="vocab-sentence-en" class="text-gray-700 font-medium italic text-base leading-relaxed mb-2">...</p>
                        <p id="vocab-sentence-kh" class="text-sm text-blue-600 font-bold">...</p>
                    </div>

                    <div class="flex justify-between items-center">
                        <button onclick="event.stopPropagation(); speakWord()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center active:scale-90 transition">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Next</p>
                            <p id="vocab-progress" class="text-xs font-bold text-blue-600">0 / 0</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Practice Section -->
        <section id="section-practice" class="hidden space-y-4 fade-in">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-blue-50">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-gray-800">តេស្តសមត្ថភាព</h3>
                    <span class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">Level: Mixed</span>
                </div>
                <div id="quiz-box">
                    <p id="quiz-question" class="font-bold text-gray-700 mb-6 text-lg"></p>
                    <div id="quiz-options" class="space-y-3"></div>
                    <div id="quiz-feedback" class="mt-6 hidden p-4 rounded-2xl text-sm font-bold text-center border"></div>
                    <button id="next-quiz" onclick="generateQuiz()" class="mt-6 w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hidden">សំណួរផ្ដាប់ទៅទៀត <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 glass-effect border-t border-gray-200 px-4 py-2 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <button onclick="switchTab('home')" id="nav-home" class="tab-button flex flex-col items-center px-4 py-2 text-blue-600 transition">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">ផ្ទះ</span>
            </button>
            <button onclick="switchTab('grammar')" id="nav-grammar" class="tab-button flex flex-col items-center px-4 py-2 text-gray-400 transition">
                <i class="fas fa-book text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">មេរៀន</span>
            </button>
            <button onclick="switchTab('vocab')" id="nav-vocab" class="tab-button flex flex-col items-center px-4 py-2 text-gray-400 transition">
                <i class="fas fa-clone text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">ពាក្យ</span>
            </button>
            <button onclick="switchTab('practice')" id="nav-practice" class="tab-button flex flex-col items-center px-4 py-2 text-gray-400 transition">
                <i class="fas fa-star text-xl"></i>
                <span class="text-[10px] mt-1 font-bold">អនុវត្ត</span>
            </button>
        </div>
    </nav>

    <script>
        const tenses = [
            { name: "Present Simple", kh: "បច្ចុប្បន្នកាលធម្មតា", formula: "S + V1 (s/es)", def: "ប្រើសម្រាប់សកម្មភាពជាទម្លាប់ ឬការពិតទូទៅ។", usage: "Habits and general truths.", keywords: "always, usually, every day", examples: ["I study English every day.", "She drinks coffee.", "The sun rises in the east."] },
            { name: "Present Continuous", kh: "បច្ចុប្បន្នកាលកំពុងបន្ត", formula: "S + am/is/are + V-ing", def: "ប្រើសម្រាប់សកម្មភាពដែលកំពុងកើតឡើងនៅពេលនិយាយ។", usage: "Action in progress now.", keywords: "now, at the moment", examples: ["I am learning now.", "They are playing.", "She is reading."] },
            { name: "Present Perfect", kh: "បច្ចុប្បន្នកាលបរិបូរណ៍", formula: "S + have/has + V3", def: "ប្រើសម្រាប់សកម្មភាពដែលបានបញ្ចប់ថ្មីៗ ឬមានលទ្ធផលដល់បច្ចុប្បន្ន។", usage: "Action completed recently with impact.", keywords: "just, yet, ever, never", examples: ["I have finished my work.", "She has visited Paris.", "They have eaten dinner."] },
            { name: "Present Perfect Continuous", kh: "បច្ចុប្បន្នកាលបរិបូរណ៍កំពុងបន្ត", formula: "S + have/has + been + V-ing", def: "បង្ហាញពីសកម្មភាពដែលបន្តពីអតីតកាលរហូតដល់បច្ចុប្បន្ន។", usage: "Duration of action up to now.", keywords: "for, since", examples: ["I have been waiting for hours.", "It has been raining.", "They have been working."] },
            { name: "Past Simple", kh: "អតីតកាលធម្មតា", formula: "S + V2", def: "ប្រើសម្រាប់សកម្មភាពដែលបានបញ្ចប់ក្នុងអតីតកាល។", usage: "Completed past actions.", keywords: "yesterday, ago, last week", examples: ["I watched a movie yesterday.", "She went to school.", "They arrived late."] },
            { name: "Past Continuous", kh: "អតីតកាលកំពុងបន្ត", formula: "S + was/were + V-ing", def: "ប្រើសម្រាប់សកម្មភាពដែលកំពុងកើតឡើងក្នុងពេលណាមួយក្នុងអតីតកាល។", usage: "Action in progress in the past.", keywords: "while, when", examples: ["I was sleeping when you called.", "They were dancing.", "It was raining."] },
            { name: "Past Perfect", kh: "អតីតកាលបរិបូរណ៍", formula: "S + had + V3", def: "ប្រើសម្រាប់សកម្មភាពដែលបានកើតឡើងមុនសកម្មភាពអតីតកាលមួយទៀត។", usage: "Past before past.", keywords: "after, before", examples: ["I had finished dinner before she arrived.", "The train had left.", "She had lived there."] },
            { name: "Past Perfect Continuous", kh: "អតីតកាលបរិបូរណ៍កំពុងបន្ត", formula: "S + had + been + V-ing", def: "បង្ហាញពីរយៈពេលនៃសកម្មភាពមុនពេលអតីតកាលមួយទៀត។", usage: "Past duration before another past event.", keywords: "for, since", examples: ["I had been working for 5 hours.", "She had been studying.", "They had been living here."] },
            { name: "Future Simple", kh: "អនាគតកាលធម្មតា", formula: "S + will + V1", def: "ប្រើសម្រាប់បង្ហាញសកម្មភាពដែលនឹងកើតឡើងក្នុងអនាគត។", usage: "Predictions, promises, spontaneous decisions.", keywords: "tomorrow, soon, next year", examples: ["I will travel to Japan next year.", "She will help you.", "It will rain."] },
            { name: "Future Continuous", kh: "អនាគតកាលកំពុងបន្ត", formula: "S + will be + V-ing", def: "ប្រើសម្រាប់សកម្មភាពដែលនឹងកំពុងកើតឡើងក្នុងអនាគត។", usage: "Action in progress in the future.", keywords: "at this time tomorrow", examples: ["I will be flying at 10 AM tomorrow.", "They will be eating.", "She will be sleeping."] },
            { name: "Future Perfect", kh: "អនាគតកាលបរិបូរណ៍", formula: "S + will have + V3", def: "ប្រើសម្រាប់សកម្មភាពដែលនឹងត្រូវបញ្ចប់នៅចំណុចណាមួយនាពេលអនាគត។", usage: "Completion in the future.", keywords: "by next year, by then", examples: ["I will have graduated by next year.", "They will have finished.", "She will have gone."] },
            { name: "Future Perfect Continuous", kh: "អនាគតកាលបរិបូរណ៍កំពុងបន្ត", formula: "S + will have been + V-ing", def: "បង្ហាញពីរយៈពេលនៃសកម្មភាពរហូតដល់ចំណុចណាមួយក្នុងអនាគត។", usage: "Duration leading up to a point in the future.", keywords: "for, since", examples: ["I will have been working here for 10 years.", "They will have been traveling.", "She will have been sleeping."] }
        ];

        // Advanced Word Pool - Expanded to 100 Unique Practical Words
        const wordPool = [
            { en: "Abandon", kh: "បោះបង់ចោល", s: "Don't abandon your dreams.", ks: "កុំបោះបង់ចោលក្តីសុបិនរបស់អ្នក។" },
            { en: "Abundant", kh: "សំបូរបែប", s: "The country has abundant natural resources.", ks: "ប្រទេសនេះមានធនធានធម្មជាតិសំបូរបែប។" },
            { en: "Achieve", kh: "សម្រេចបាន", s: "You can achieve anything with hard work.", ks: "អ្នកអាចសម្រេចបាននូវអ្វីៗគ្រប់យ៉ាងតាមរយៈការខិតខំប្រឹងប្រែង។" },
            { en: "Acquire", kh: "ទទួលបាន/ទិញបាន", s: "She acquired a new skill.", ks: "នាងទទួលបានជំនាញថ្មីមួយ។" },
            { en: "Adapt", kh: "បន្សំខ្លួន/សម្របខ្លួន", s: "Animals must adapt to their environment.", ks: "សត្វត្រូវតែសម្របខ្លួនទៅនឹងមជ្ឈដ្ឋានរបស់ពួកវា។" },
            { en: "Advocate", kh: "គាំទ្រ/តស៊ូមតិ", s: "He is a strong advocate for human rights.", ks: "គាត់គឺជាអ្នកគាំទ្រយ៉ាងខ្លាំងដល់សិទ្ធិមនុស្ស។" },
            { en: "Ambition", kh: "មហិច្ឆតា", s: "His ambition is to be a doctor.", ks: "មហិច្ឆតារបស់គាត់គឺចង់ក្លាយជាគ្រូពេទ្យ។" },
            { en: "Analyze", kh: "វិភាគ", s: "We need to analyze the data.", ks: "យើងត្រូវការវិភាគទិន្នន័យ។" },
            { en: "Appreciate", kh: "ដឹងគុណ/ឲ្យតម្លៃ", s: "I appreciate your help.", ks: "ខ្ញុំដឹងគុណចំពោះការជួយរបស់អ្នក។" },
            { en: "Assistance", kh: "ជំនួយ", s: "Do you need any assistance?", ks: "តើអ្នកត្រូវការជំនួយអ្វីទេ?" },
            { en: "Barrier", kh: "របាំង/ឧបសគ្គ", s: "Language is often a barrier.", ks: "ភាសាជារឿយៗគឺជាឧបសគ្គ។" },
            { en: "Benefit", kh: "អត្ថប្រយោជន៍", s: "Walking is a benefit to health.", ks: "ការដើរគឺជាអត្ថប្រយោជន៍ដល់សុខភាព។" },
            { en: "Benevolent", kh: "ចិត្តបុណ្យ", s: "A benevolent person helps others.", ks: "មនុស្សចិត្តបុណ្យតែងតែជួយអ្នកដទៃ។" },
            { en: "Brief", kh: "សង្ខេប", s: "Give me a brief report.", ks: "ផ្ដល់របាយការណ៍សង្ខេបមកខ្ញុំ។" },

            { en: "Humanity", kh: "មនុស្សជាតិ", s: "Help humanity.", ks: "ជួយដល់មនុស្សជាតិ។" },
            { en: "Identity", kh: "អត្តសញ្ញាណ", s: "Keep your identity safe.", ks: "រក្សាអត្តសញ្ញាណរបស់អ្នកឱ្យមានសុវត្ថិភាព។" },
            { en: "Illuminate", kh: "បំភ្លឺ", s: "The sun illuminates the earth.", ks: "ព្រះអាទិត្យបំភ្លឺផែនដី។" },
            { en: "Importance", kh: "សារៈសំខាន់", s: "Understand the importance of time.", ks: "យល់ពីសារៈសំខាន់នៃពេលវេលា។" },
            { en: "Improvement", kh: "ការកែលម្អ", s: "Continuous improvement is necessary.", ks: "ការកែលម្អជាបន្តបន្ទាប់គឺចាំបាច់។" },
            { en: "Individual", kh: "បុគ្គល", s: "Every individual is unique.", ks: "បុគ្គលម្នាក់ៗគឺប្លែកៗគ្នា។" },
            { en: "Influence", kh: "ឥទ្ធិពល", s: "Social media has a big influence.", ks: "បណ្ដាញសង្គមមានឥទ្ធិពលធំធេងណាស់។" },
            { en: "Information", kh: "ព័ត៌មាន", s: "Thanks for the information.", ks: "អរគុណសម្រាប់ព័ត៌មាន។" },
            { en: "Innovation", kh: "នវានុវត្តន៍/ការបង្កើតថ្មី", s: "Innovation drives progress.", ks: "ការបង្កើតថ្មីជម្រុញឱ្យមានការរីកចម្រើន។" },
            { en: "Integrity", kh: "សុចរិតភាព", s: "Integrity is doing the right thing.", ks: "សុចរិតភាពគឺការធ្វើអ្វីដែលត្រឹមត្រូវ។" },
            { en: "Intelligent", kh: "ឆ្លាតវៃ", s: "She is an intelligent student.", ks: "នាងគឺជាសិស្សដែលឆ្លាតវៃម្នាក់។" }
        ];

        let currentXp = 0;
        let vocabIndex = 0;
        let vocabWords = [...wordPool];
        let currentQuizIndex = 0;

        const quizzes = [
            { q: "I _______ (study) English every day.", options: ["study", "studies", "studying", "studied"], ans: "study" },
            { q: "She _______ (not / like) apples.", options: ["don't like", "doesn't like", "not like", "no like"], ans: "doesn't like" },
            { q: "They _______ (play) football now.", options: ["play", "plays", "are playing", "is playing"], ans: "are playing" },
            { q: "Have you _______ your homework?", options: ["finish", "finishes", "finished", "finishing"], ans: "finished" },
            { q: "He was _______ when I called.", options: ["sleep", "sleeps", "sleeping", "slept"], ans: "sleeping" }
        ];

        function switchTab(tabId) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + tabId).classList.remove('hidden');
            
            document.querySelectorAll('.tab-button').forEach(b => {
                b.classList.remove('text-blue-600');
                b.classList.add('text-gray-400');
            });
            const activeNav = document.getElementById('nav-' + tabId);
            if (activeNav) {
                activeNav.classList.add('text-blue-600');
                activeNav.classList.remove('text-gray-400');
            }
            window.scrollTo(0, 0);
        }

        function renderTenses() {
            const list = document.getElementById('tenses-list');
            if(!list) return;
            list.innerHTML = tenses.map((t, index) => `
                <div class="bg-white p-5 rounded-2xl border border-gray-100 card-shadow tense-card transition hover:scale-[1.02] duration-300">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-blue-600 text-lg">${t.name}</h4>
                        <span class="text-[10px] bg-blue-50 text-blue-500 px-2 py-1 rounded-full font-bold uppercase">Lesson ${index+1}</span>
                    </div>
                    <p class="text-gray-700 font-bold text-sm mb-3">${t.kh}</p>
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 mb-4 text-center">
                        <span class="text-xs text-gray-400 block mb-1 uppercase tracking-tighter font-bold">Formula</span>
                        <code class="text-blue-600 font-black text-sm">${t.formula}</code>
                    </div>
                    <div class="space-y-3">
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Usage</p>
                            <p class="text-xs text-gray-600 leading-relaxed">${t.def}</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Examples</p>
                            <ul class="list-disc list-inside text-xs text-gray-600 mt-1 space-y-1">
                                ${t.examples.map(ex => `<li>${ex}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function shuffleVocab(e) {
            for (let i = vocabWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [vocabWords[i], vocabWords[j]] = [vocabWords[j], vocabWords[i]];
            }
            vocabIndex = 0;
            updateFlashcard();
            
            if(e && e.target) {
                const btn = e.target.closest('button');
                if(btn) {
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check mr-2"></i> រួចរាល់';
                    setTimeout(() => btn.innerHTML = originalHtml, 1000);
                }
            }
        }

        function updateFlashcard() {
            const word = vocabWords[vocabIndex];
            document.getElementById('vocab-en').innerText = word.en;
            document.getElementById('vocab-kh').innerText = word.kh;
            document.getElementById('vocab-sentence-en').innerText = `"${word.s}"`;
            document.getElementById('vocab-sentence-kh').innerText = word.ks;
            document.getElementById('vocab-progress').innerText = `${vocabIndex + 1} / ${vocabWords.length}`;
            
            const container = document.getElementById('flashcard-container');
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
        }

        function nextVocab() {
            vocabIndex = (vocabIndex + 1) % vocabWords.length;
            updateFlashcard();
        }

        function speakWord() {
            const word = vocabWords[vocabIndex].en;
            const sentence = vocabWords[vocabIndex].s;
            const utterWord = new SpeechSynthesisUtterance(word);
            utterWord.lang = 'en-US';
            utterWord.rate = 0.8;
            utterWord.onend = () => {
                setTimeout(() => {
                    const utterSentence = new SpeechSynthesisUtterance(sentence);
                    utterSentence.lang = 'en-US';
                    utterSentence.rate = 0.9;
                    window.speechSynthesis.speak(utterSentence);
                }, 500);
            };
            window.speechSynthesis.speak(utterWord);
        }

        function generateQuiz() {
            const q = quizzes[currentQuizIndex % quizzes.length];
            document.getElementById('quiz-question').innerText = q.q;
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = q.options.map(opt => `
                <button onclick="checkQuiz(this, '${opt}')" class="quiz-opt w-full text-left p-4 rounded-2xl border border-gray-100 hover:border-blue-400 active:bg-blue-50 transition font-bold text-gray-700 flex justify-between items-center group">
                    <span>${opt}</span>
                    <i class="fas fa-chevron-right text-gray-300 group-hover:text-blue-400 transition"></i>
                </button>
            `).join('');
            document.getElementById('quiz-feedback').classList.add('hidden');
            document.getElementById('next-quiz').classList.add('hidden');
        }

        function checkQuiz(btn, answer) {
            const q = quizzes[currentQuizIndex % quizzes.length];
            const feedback = document.getElementById('quiz-feedback');
            document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
            feedback.classList.remove('hidden');
            if (answer === q.ans) {
                btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
                feedback.innerHTML = '<i class="fas fa-check-circle mr-2"></i> ចម្លើយត្រឹមត្រូវ 🎉 (+10 XP)';
                feedback.className = "mt-6 p-4 rounded-2xl text-sm font-bold bg-green-50 text-green-700 border border-green-200 text-center";
                currentXp += 10;
                document.getElementById('user-xp').innerText = currentXp;
            } else {
                btn.classList.add('bg-red-100', 'border-red-500', 'text-red-700');
                feedback.innerHTML = `<i class="fas fa-times-circle mr-2"></i> ចម្លើយគឺ: <b>${q.ans}</b>`;
                feedback.className = "mt-6 p-4 rounded-2xl text-sm font-bold bg-red-50 text-red-700 border border-red-200 text-center";
            }
            document.getElementById('next-quiz').classList.remove('hidden');
            currentQuizIndex++;
        }

        window.onload = function() {
            renderTenses();
            shuffleVocab(); 
            generateQuiz();
            switchTab('home');
        };
    </script>
</body>
</html>
